<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מנהל מאמץ מנהל — יומן ניהולי אישי</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@300;400;500;700;900&family=Heebo:wght@300;400;500;600&family=Assistant:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f7f5f1;
  --surface: #ffffff;
  --surface2: #f0ede8;
  --border: #e0dbd2;
  --gold: #b8913a;
  --gold-light: #c9a84c;
  --gold-dim: rgba(184,145,58,0.10);
  --text: #1a1814;
  --text-dim: #5a5550;
  --text-muted: #9a9690;
  --accent: #3a6a8a;
  --success: #2d7a5e;
  --font-display: 'Frank Ruhl Libre', serif;
  --font-body: 'Heebo', sans-serif;
  --radius: 8px;
  --transition: 0.25s ease;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  font-size: 15px;
  line-height: 1.7;
  min-height: 100vh;
  direction: rtl;
}

/* ── GRAIN OVERLAY REMOVED FOR LIGHT THEME ── */

/* ── SCREENS ── */
.screen { display: none; min-height: 100vh; position: relative; z-index: 1; }
.screen.active { display: flex; flex-direction: column; }

/* ── LOGIN SCREEN ── */
#loginScreen {
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
  background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(184,145,58,0.08) 0%, transparent 70%);
}

.login-box {
  width: 100%;
  max-width: 320px;
  text-align: center;
}

.logo-mark {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 64px;
  height: 64px;
  border: 1px solid var(--gold);
  border-radius: 50%;
  margin-bottom: 28px;
  position: relative;
}
.logo-mark::after {
  content: '';
  position: absolute;
  inset: 4px;
  border-radius: 50%;
  border: 1px solid rgba(201,168,76,0.3);
}
.logo-mark svg { width: 28px; height: 28px; fill: var(--gold); }

.login-title {
  font-family: var(--font-display);
  font-size: 28px;
  font-weight: 500;
  color: var(--text);
  letter-spacing: -0.02em;
  margin-bottom: 6px;
}

.login-subtitle {
  color: var(--text-dim);
  font-size: 14px;
  font-weight: 300;
  margin-bottom: 40px;
  letter-spacing: 0.05em;
}

.login-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 36px 32px;
  box-shadow: 0 2px 16px rgba(0,0,0,0.06);
}

.field-label {
  display: block;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-dim);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 10px;
  text-align: right;
}

.code-input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 18px;
  color: var(--text);
  font-family: var(--font-display);
  font-size: 24px;
  font-weight: 500;
  letter-spacing: 0.2em;
  text-align: center;
  outline: none;
  transition: border-color var(--transition), box-shadow var(--transition);
  direction: ltr;
}

.code-input:focus {
  border-color: var(--gold);
  box-shadow: 0 0 0 3px var(--gold-dim);
}

.code-input::placeholder {
  color: var(--text-muted);
  letter-spacing: 0.1em;
  font-size: 16px;
}

.btn-primary {
  width: 100%;
  margin-top: 14px;
  background: var(--gold);
  color: #ffffff;
  border: none;
  border-radius: var(--radius);
  padding: 11px 24px;
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: background var(--transition), transform var(--transition);
  letter-spacing: 0.03em;
}
.btn-primary:hover { background: var(--gold-light); transform: translateY(-1px); }
.btn-primary:active { transform: translateY(0); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

.error-msg {
  margin-top: 14px;
  padding: 10px 14px;
  background: rgba(200, 70, 70, 0.08);
  border: 1px solid rgba(200, 70, 70, 0.25);
  border-radius: var(--radius);
  color: #c05050;
  font-size: 13px;
  display: none;
}

/* ── NAMES LIST ── */
.names-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
  max-height: 420px;
  overflow-y: auto;
  margin-top: 4px;
}

.names-loading {
  display: flex;
  align-items: center;
  padding: 16px 0;
}

/* School group button */
.school-btn {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 18px;
  text-align: right;
  cursor: pointer;
  transition: all var(--transition);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}

.school-btn:hover, .school-btn.open {
  border-color: var(--gold);
  background: var(--gold-dim);
}

.school-btn-text {
  font-family: 'Assistant', sans-serif;
  font-size: 17px;
  font-weight: 600;
  color: var(--text);
}

.school-btn-count {
  font-size: 11px;
  color: var(--text-muted);
  background: var(--surface2);
  border-radius: 20px;
  padding: 2px 8px;
  margin-right: auto;
  margin-left: 4px;
}

.school-btn-arrow {
  color: var(--text-muted);
  flex-shrink: 0;
  transition: transform var(--transition), color var(--transition);
}

.school-btn.open .school-btn-arrow {
  transform: rotate(90deg);
  color: var(--gold);
}

/* Participants inside school */
.participants-list {
  display: none;
  flex-direction: column;
  gap: 4px;
  padding: 4px 0 4px 12px;
  border-right: 2px solid var(--gold-dim);
  margin-right: 8px;
}

.participants-list.open {
  display: flex;
}

.name-btn {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 11px 16px;
  text-align: right;
  cursor: pointer;
  transition: all var(--transition);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}

.name-btn:hover {
  border-color: var(--gold);
  background: var(--gold-dim);
  transform: translateX(-2px);
}

.name-btn-text {
  font-family: 'Assistant', sans-serif;
  font-size: 15px;
  font-weight: 500;
  color: var(--text);
  letter-spacing: 0;
}

.name-btn-arrow {
  color: var(--text-muted);
  flex-shrink: 0;
  transition: color var(--transition);
}

.name-btn:hover .name-btn-arrow {
  color: var(--gold);
}

.login-footer {
  margin-top: 24px;
  color: var(--text-muted);
  font-size: 12px;
}

/* ── DASHBOARD SCREEN ── */
#dashboardScreen {
  padding: 0;
}

.top-bar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 16px 40px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}

.top-bar-brand {
  font-family: var(--font-display);
  font-size: 16px;
  font-weight: 500;
  color: var(--gold);
  letter-spacing: -0.01em;
}

.top-bar-user {
  display: flex;
  align-items: center;
  gap: 12px;
}

.user-name {
  font-size: 14px;
  color: var(--text-dim);
}

.btn-logout {
  background: none;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 4px 10px;
  color: var(--text-muted);
  font-size: 12px;
  cursor: pointer;
  transition: all var(--transition);
}
.btn-logout:hover { border-color: var(--text-muted); color: var(--text-dim); }

.dashboard-content {
  max-width: 900px;
  margin: 0 auto;
  padding: 48px 40px;
}

.welcome-section {
  margin-bottom: 48px;
}

.welcome-greeting {
  font-size: 13px;
  color: var(--gold);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  font-weight: 500;
  margin-bottom: 10px;
}

.welcome-name {
  font-family: var(--font-display);
  font-size: 38px;
  font-weight: 400;
  color: var(--text);
  letter-spacing: -0.03em;
  line-height: 1.2;
  margin-bottom: 12px;
}

.welcome-desc {
  color: var(--text-dim);
  font-size: 15px;
  font-weight: 300;
  max-width: 520px;
  line-height: 1.7;
}

/* Progress Bar */
.progress-section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px 28px;
  margin-bottom: 40px;
}

.progress-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 14px;
}

.progress-label {
  font-size: 13px;
  color: var(--text-dim);
  font-weight: 500;
}

.progress-count {
  font-family: var(--font-display);
  font-size: 24px;
  font-weight: 500;
  color: var(--gold);
}

.progress-track {
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--gold) 0%, var(--gold-light) 100%);
  border-radius: 2px;
  transition: width 0.6s ease;
  width: 0%;
}

/* Session Cards */
.sessions-grid {
  display: grid;
  gap: 16px;
}

.session-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px 28px;
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  gap: 24px;
  cursor: pointer;
  transition: border-color var(--transition), background var(--transition), transform var(--transition);
  text-decoration: none;
  color: inherit;
}

.session-card:hover {
  border-color: var(--gold);
  background: var(--surface2);
  transform: translateX(-4px);
}

.session-number {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-display);
  font-size: 18px;
  font-weight: 500;
  color: var(--text-muted);
  flex-shrink: 0;
  transition: all var(--transition);
}

.session-card:hover .session-number {
  border-color: var(--gold);
  color: var(--gold);
}

.session-card.completed .session-number {
  background: var(--gold-dim);
  border-color: var(--gold);
  color: var(--gold);
}

.session-card.draft .session-number {
  background: rgba(74,127,165,0.1);
  border-color: rgba(74,127,165,0.4);
  color: var(--accent);
}

.session-info {}

.session-title-text {
  font-family: var(--font-display);
  font-size: 17px;
  font-weight: 400;
  color: var(--text);
  margin-bottom: 4px;
  letter-spacing: -0.01em;
}

.session-meta {
  font-size: 12px;
  color: var(--text-muted);
}

.session-status {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  font-weight: 500;
  white-space: nowrap;
}

.status-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--text-muted);
}

.status-empty .status-dot { background: var(--text-muted); }
.status-draft .status-dot { background: var(--accent); }
.status-done .status-dot { background: var(--gold); }

.status-empty { color: var(--text-muted); }
.status-draft { color: var(--accent); }
.status-done { color: var(--gold); }

/* ── SESSION SCREEN ── */
#sessionScreen {
  padding: 0;
}

.session-top-bar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 14px 40px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}

.back-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  background: none;
  border: none;
  color: var(--text-dim);
  font-size: 13px;
  cursor: pointer;
  padding: 4px 0;
  transition: color var(--transition);
}
.back-btn:hover { color: var(--text); }
.back-btn svg { width: 14px; height: 14px; }

.save-status {
  font-size: 12px;
  color: var(--text-muted);
  display: flex;
  align-items: center;
  gap: 6px;
  transition: color var(--transition);
}
.save-status.saving { color: var(--accent); }
.save-status.saved { color: var(--success); }

.session-content-wrap {
  max-width: 760px;
  margin: 0 auto;
  padding: 48px 40px 80px;
}

.session-header {
  margin-bottom: 48px;
}

.session-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--gold-dim);
  border: 1px solid rgba(201,168,76,0.3);
  border-radius: 20px;
  padding: 3px 11px;
  font-size: 11px;
  color: var(--gold);
  font-weight: 500;
  letter-spacing: 0.05em;
  margin-bottom: 14px;
}

.session-main-title {
  font-family: var(--font-display);
  font-size: 34px;
  font-weight: 400;
  color: var(--text);
  letter-spacing: -0.03em;
  line-height: 1.2;
  margin-bottom: 10px;
}

.session-desc {
  color: var(--text-dim);
  font-size: 14px;
  font-weight: 300;
}

/* Form Sections */
.form-section {
  margin-bottom: 40px;
}

.section-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 24px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--border);
}

.section-icon {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  background: var(--gold-dim);
  border: 1px solid rgba(201,168,76,0.3);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-display);
  font-size: 13px;
  color: var(--gold);
  font-weight: 600;
  flex-shrink: 0;
}

.section-title {
  font-family: var(--font-display);
  font-size: 18px;
  font-weight: 500;
  color: var(--text);
  letter-spacing: -0.01em;
}

.section-subtitle {
  font-size: 13px;
  color: var(--text-muted);
  margin-right: auto;
}

/* Fields */
.field-group { margin-bottom: 22px; }

.field-label {
  display: block;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-dim);
  margin-bottom: 8px;
}

.field-hint {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 5px;
}

textarea.field-input,
input.field-input {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 13px 16px;
  color: var(--text);
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 300;
  line-height: 1.7;
  outline: none;
  resize: vertical;
  transition: border-color var(--transition), box-shadow var(--transition);
  direction: rtl;
  min-height: 80px;
}

input.field-input {
  min-height: unset;
  height: 46px;
  resize: none;
}

textarea.field-input:focus,
input.field-input:focus {
  border-color: var(--gold);
  box-shadow: 0 0 0 3px var(--gold-dim);
}

textarea.field-input::placeholder,
input.field-input::placeholder {
  color: var(--text-muted);
  font-style: italic;
}

/* Scale 1-5 */
.scale-group { margin-bottom: 22px; }

.scale-options {
  display: flex;
  gap: 8px;
  margin-top: 8px;
}

.scale-btn {
  flex: 1;
  height: 36px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text-muted);
  font-size: 14px;
  font-family: var(--font-display);
  font-weight: 500;
  cursor: pointer;
  transition: all var(--transition);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 2px;
}

.scale-btn span.scale-label {
  font-size: 9px;
  font-family: var(--font-body);
  font-weight: 400;
  letter-spacing: 0;
  display: none;
}

.scale-btn:first-child span.scale-label,
.scale-btn:last-child span.scale-label {
  display: block;
}

.scale-btn:hover {
  border-color: var(--gold);
  color: var(--gold);
  background: var(--gold-dim);
}

.scale-btn.selected {
  background: var(--gold-dim);
  border-color: var(--gold);
  color: var(--gold);
  font-weight: 700;
}

/* Radio / Toggle */
.radio-group { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 8px; }

.radio-option {
  position: relative;
}

.radio-option input[type=radio] {
  position: absolute;
  opacity: 0;
  width: 0;
  height: 0;
}

.radio-label {
  display: inline-flex;
  align-items: center;
  padding: 5px 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  font-size: 13px;
  color: var(--text-dim);
  cursor: pointer;
  transition: all var(--transition);
  user-select: none;
}

.radio-option input:checked + .radio-label {
  background: var(--gold-dim);
  border-color: var(--gold);
  color: var(--gold);
  font-weight: 500;
}

/* Special question box */
.special-question {
  background: linear-gradient(135deg, rgba(201,168,76,0.08) 0%, transparent 100%);
  border: 1px solid rgba(201,168,76,0.25);
  border-radius: 12px;
  padding: 24px;
  margin-bottom: 22px;
}

.special-question-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--gold);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 10px;
}

.special-question-text {
  font-family: var(--font-display);
  font-size: 17px;
  font-weight: 400;
  color: var(--text);
  line-height: 1.5;
  margin-bottom: 16px;
  letter-spacing: -0.01em;
}

/* Submit section */
.submit-section {
  border-top: 1px solid var(--border);
  padding-top: 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 16px;
}

.btn-save-draft {
  background: none;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 9px 20px;
  color: var(--text-dim);
  font-size: 13px;
  font-family: var(--font-body);
  cursor: pointer;
  transition: all var(--transition);
  height: 38px;
  display: inline-flex;
  align-items: center;
}
.btn-save-draft:hover { border-color: var(--text-dim); color: var(--text); }

.btn-submit {
  background: var(--gold);
  border: none;
  border-radius: var(--radius);
  padding: 9px 20px;
  color: #ffffff;
  font-size: 13px;
  font-weight: 600;
  font-family: var(--font-body);
  cursor: pointer;
  transition: all var(--transition);
  display: inline-flex;
  align-items: center;
  gap: 6px;
  height: 38px;
}
.btn-submit:hover { background: var(--gold-light); transform: translateY(-1px); }

/* Toast */
.toast {
  position: fixed;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 24px;
  font-size: 14px;
  color: var(--text);
  z-index: 999;
  opacity: 0;
  transition: all 0.3s ease;
  pointer-events: none;
  white-space: nowrap;
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
.toast.success { border-color: var(--success); color: #5dba96; }
.toast.error { border-color: rgba(200,70,70,0.4); color: #e07070; }

/* Loading */
.loader {
  display: inline-block;
  width: 16px;
  height: 16px;
  border: 2px solid rgba(201,168,76,0.3);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Divider */
.section-divider {
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--border), transparent);
  margin: 40px 0;
}

/* Mobile */
@media (max-width: 600px) {
  .top-bar, .session-top-bar { padding: 14px 20px; }
  .dashboard-content, .session-content-wrap { padding: 28px 20px 60px; }
  .welcome-name { font-size: 28px; }
  .session-card { grid-template-columns: auto 1fr; gap: 16px; }
  .session-status { display: none; }
  .session-main-title { font-size: 26px; }
  .scale-options { gap: 6px; }
  .submit-section { flex-direction: column-reverse; }
  .btn-save-draft, .btn-submit { width: 100%; justify-content: center; height: 44px; }
  .session-top-bar { padding: 10px 16px; }
}

/* Fade in */
.fade-in {
  animation: fadeIn 0.4s ease forwards;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Shimmer loading */
.shimmer {
  background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
  border-radius: 4px;
}
@keyframes shimmer { to { background-position: -200% 0; } }
</style>
</head>

// ═══════════════════════════ API ═══════════════════════════
async function apiCall(action, body = {}) {
  if (DEMO_MODE) return demoApiCall(action, body);

  const res = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action, ...body })
  });
  return res.json();
}

// Demo mode: uses localStorage as backend
function demoApiCall(action, body) {
  const db = JSON.parse(localStorage.getItem('mmm_db') || '{}');
  if (!db.participants) db.participants = getDemoParticipants();
  if (!db.responses) db.responses = {};

  switch (action) {
    case 'getParticipantNames':
      return {
        success: true,
        names: db.participants.map(p => ({
          accessCode: p.accessCode,
          fullName: p.fullName,
          organization: p.organization
        }))
      };
    case 'login':
    case 'getParticipant': {
      const p = db.participants.find(p => p.accessCode === body.accessCode.toUpperCase());
      if (p) return { success: true, participant: p };
      return { success: false, error: 'קוד גישה שגוי' };
    }
    case 'saveSession': {
      const key = `${body.accessCode}_${body.sessionNumber}`;
      const now = new Date().toISOString();
      db.responses[key] = {
        ...body.data,
        participantId: body.accessCode,
        sessionNumber: body.sessionNumber,
        updatedAt: now,
        createdAt: db.responses[key]?.createdAt || now
      };
      localStorage.setItem('mmm_db', JSON.stringify(db));
      return { success: true, message: 'נשמר' };
    }
    case 'getSession': {
      const key = `${body.accessCode}_${body.sessionNumber}`;
      return { success: true, data: db.responses[key] || null };
    }
    case 'getAllSessions': {
      const sessions = {};
      for (let i = 1; i <= 5; i++) {
        const key = `${body.accessCode}_${i}`;
        if (db.responses[key]) sessions[i] = db.responses[key];
      }
      return { success: true, sessions };
    }
    default:
      return { success: false, error: 'Unknown action (demo)' };
  }
}

// ═══════════════════════════ LOGIN ═══════════════════════════
async function loadNamesList() {
  const result = await apiCall('getParticipantNames', {});
  const container = document.getElementById('namesList');

  if (!result.success || !result.names || result.names.length === 0) {
    container.innerHTML = '<div style="padding:16px;color:var(--text-muted);font-size:13px">לא נמצאו משתתפים</div>';
    return;
  }

  // Group by organization
  const groups = {};
  result.names.forEach(p => {
    const org = p.organization || 'אחר';
    if (!groups[org]) groups[org] = [];
    groups[org].push(p);
  });

  const sortedOrgs = Object.keys(groups).sort((a, b) => {
    if (a === 'עיריית נתניה') return -1;
    if (b === 'עיריית נתניה') return 1;
    return a.localeCompare(b, 'he');
  });

  container.innerHTML = sortedOrgs.map((org, idx) => {
    const members = groups[org];
    const groupId = 'group_' + idx;

    const memberBtns = members.map(p => `
      <button class="name-btn" onclick="selectParticipant('${p.accessCode}')">
        <span class="name-btn-text">${p.fullName}</span>
        <svg class="name-btn-arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
      </button>
    `).join('');

    return `
      <button class="school-btn" onclick="toggleSchool('${groupId}', this)">
        <span class="school-btn-text">${org}</span>
        <span class="school-btn-count">${members.length}</span>
        <svg class="school-btn-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
      </button>
      <div class="participants-list" id="${groupId}">
        ${memberBtns}
      </div>
    `;
  }).join('');
}

function toggleSchool(groupId, btn) {
  const list = document.getElementById(groupId);
  const isOpen = list.classList.contains('open');
  // Close all
  document.querySelectorAll('.participants-list').forEach(l => l.classList.remove('open'));
  document.querySelectorAll('.school-btn').forEach(b => b.classList.remove('open'));
  // Open clicked (if was closed)
  if (!isOpen) {
    list.classList.add('open');
    btn.classList.add('open');
  }
}

async function selectParticipant(accessCode) {
  // Disable all buttons during login
  document.querySelectorAll('.name-btn').forEach(b => b.disabled = true);

  const result = await apiCall('login', { accessCode });

  if (result.success) {
    state.participant = result.participant;
    hideError();
    await showDashboard();
  } else {
    showError('שגיאה בטעינת הנתונים — נסה/י שנית');
    document.querySelectorAll('.name-btn').forEach(b => b.disabled = false);
  }
}

function showError(msg) {
  const el = document.getElementById('loginError');
  el.textContent = msg;
  el.style.display = 'block';
}
function hideError() {
  document.getElementById('loginError').style.display = 'none';
}

// ═══════════════════════════ DASHBOARD ═══════════════════════════
async function showDashboard() {
  showScreen('dashboardScreen');

  const p = state.participant;
  document.getElementById('welcomeName').textContent = p.fullName;
  document.getElementById('topBarName').textContent = p.fullName;

  // Load all sessions status
  const result = await apiCall('getAllSessions', { accessCode: p.accessCode });
  if (result.success) state.sessions = result.sessions;

  renderDashboard();
}

function renderDashboard() {
  const completed = Object.values(state.sessions).filter(s => s.isSubmitted === 'TRUE' || s.isSubmitted === true).length;
  const draft = Object.values(state.sessions).filter(s => s && !(s.isSubmitted === 'TRUE' || s.isSubmitted === true)).length;

  document.getElementById('progressCount').textContent = `${completed}/5`;
  document.getElementById('progressFill').style.width = `${(completed / 5) * 100}%`;

  const grid = document.getElementById('sessionsGrid');
  grid.innerHTML = SESSIONS.map(s => {
    const data = state.sessions[s.number];
    const isCompleted = data && (data.isSubmitted === 'TRUE' || data.isSubmitted === true);
    const isDraft = data && !isCompleted;

    let cardClass = '';
    let statusHTML = '';

    if (isCompleted) {
      cardClass = 'completed';
      statusHTML = `<div class="session-status status-done"><div class="status-dot"></div> הושלם</div>`;
    } else if (isDraft) {
      cardClass = 'draft';
      statusHTML = `<div class="session-status status-draft"><div class="status-dot"></div> טיוטה</div>`;
    } else {
      statusHTML = `<div class="session-status status-empty"><div class="status-dot"></div> לא מולא</div>`;
    }

    return `
      <div class="session-card ${cardClass}" onclick="openSession(${s.number})">
        <div class="session-number">${s.number}</div>
        <div class="session-info">
          <div class="session-title-text">${s.title}</div>
          <div class="session-meta">מפגש ${s.number} · חמישה חלקים</div>
        </div>
        ${statusHTML}
      </div>
    `;
  }).join('');
}

// ═══════════════════════════ SESSION ═══════════════════════════
async function openSession(num) {
  state.currentSession = num;
  showScreen('sessionScreen');

  const sessionDef = SESSIONS[num - 1];
  const savedResult = await apiCall('getSession', {
    accessCode: state.participant.accessCode,
    sessionNumber: num
  });

  const saved = savedResult.success ? savedResult.data : null;

  renderSessionForm(sessionDef, saved);
}

          `).join('')}

    <div class="section-divider"></div>

    <div class="section-divider"></div>

    <!-- PART D -->
    <div class="form-section">
      <div class="section-header">
        <div class="section-icon">ד</div>
        <div>
          <div class="section-title">פעולה</div>
        </div>
      </div>

      <div class="field-group">
        <label class="field-label">מהו צעד אחד ברור שאני מתחייב/ת לבצע עד המפגש הבא?</label>
        <textarea class="field-input" id="f_actionCommitment" rows="2" placeholder="צעד ספציפי, ניתן למדידה...">${d.actionCommitment || ''}</textarea>
      </div>

      <div class="field-group">
        <label class="field-label">מה ייחשב בעיניי התקדמות?</label>
        <input type="text" class="field-input" id="f_progressDefinition" placeholder="כיצד תדע/י שהתקדמת?" value="${d.progressDefinition || ''}">
      </div>

      <div class="field-group">
        <label class="field-label">איזה משאב / שותפות / תמיכה דרושים לי?</label>
        <input type="text" class="field-input" id="f_supportNeeded" placeholder="מה תצטרך/י כדי להצליח?" value="${d.supportNeeded || ''}">
      </div>
    </div>

    <div class="section-divider"></div>

    <!-- PART E + Special -->
    <div class="form-section">
      <div class="section-header">
        <div class="section-icon">ה</div>
        <div>
          <div class="section-title">תמצית ורפלקציה</div>
        </div>
      </div>

      <div class="special-question">
        <div class="special-question-label">שאלת המפגש</div>
        <div class="special-question-text">${s.customQuestion}</div>
        <textarea class="field-input" id="f_customSessionQuestionAnswer" rows="3" placeholder="מחשבתך על השאלה הייעודית למפגש זה...">${d.customSessionQuestionAnswer || ''}</textarea>
      </div>

      <div class="field-group">
        <label class="field-label">כתוב/כתבי במשפט אחד את התובנה המרכזית שלך מהמפגש</label>
        <input type="text" class="field-input" id="f_summarySentence" placeholder="משפט תמצות אחד, חד וברור..." value="${d.summarySentence || ''}">
      </div>


    </div>

    <!-- Date + Submit -->
    <div class="field-group" style="margin-bottom:28px;">
      <label class="field-label">תאריך מילוי</label>
      <input type="date" class="field-input date-input" id="f_sessionDate"
        value="${d.sessionDate || new Date().toISOString().split('T')[0]}"
        style="height:44px;min-height:unset;">
    </div>
    <div class="submit-section">
      <button class="btn-save-draft" onclick="saveSession(false)">שמירה כטיוטה</button>
      <button class="btn-submit" onclick="saveSession(true)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
        סיום ושמירה
      </button>
    </div>
  `;

  document.getElementById('sessionContent').innerHTML = html;
  window.scrollTo(0, 0);

  // autosave on change
  document.querySelectorAll('.field-input, input[type=radio]').forEach(el => {
    el.addEventListener('change', () => autoSave());
    if (el.tagName === 'TEXTAREA' || el.type === 'text') {
      el.addEventListener('input', debounce(() => autoSave(), 2000));
    }
  });
}

// ═══════════════════════════ SAVE ═══════════════════════════
function collectFormData(isSubmitted = false) {
  const getVal = id => document.getElementById(id)?.value || '';
  const getRadio = name => document.querySelector(`input[name="${name}"]:checked`)?.value || '';
  const getScale = id => {
    const sel = document.querySelector(`#${id} .scale-btn.selected`);
    return sel ? parseInt(sel.dataset.value) : null;
  };

  return {
    mainInsight: getVal('f_mainInsight'),
    centralIdea: getVal('f_centralIdea'),
    relevanceScore: getScale('scaleRelevance'),
    dialogueStatus: getRadio('dialogueStatus'),
    dialogueTopic: getVal('f_dialogueTopic'),
    dialogueReflection: getVal('f_dialogueReflection'),
    organizationalConnection: getVal('f_organizationalConnection'),
    managementChallenge: getVal('f_managementChallenge'),
    actionCommitment: getVal('f_actionCommitment'),
    progressDefinition: getVal('f_progressDefinition'),
    supportNeeded: getVal('f_supportNeeded'),
    summarySentence: getVal('f_summarySentence'),
    sessionDate: getVal('f_sessionDate'),
    customSessionQuestionAnswer: getVal('f_customSessionQuestionAnswer'),
    isSubmitted
  };
}

async function saveSession(isSubmitted = false) {
  const data = collectFormData(isSubmitted);
  setSaveStatus('saving', 'שומר...');

  const result = await apiCall('saveSession', {
    accessCode: state.participant.accessCode,
    sessionNumber: state.currentSession,
    data
  });

  if (result.success) {
    state.sessions[state.currentSession] = { ...data, sessionNumber: state.currentSession };
    setSaveStatus('saved', 'נשמר ✓');
    if (isSubmitted) {
      showToast('המפגש הושלם ונשמר בהצלחה', 'success');
      setTimeout(() => goToDashboard(), 1200);
    } else {
      showToast('הטיוטה נשמרה', 'success');
      setTimeout(() => setSaveStatus('', 'נשמר'), 3000);
    }
  } else {
    setSaveStatus('', 'שגיאה בשמירה');
    showToast('שגיאה בשמירה — נסה/י שנית', 'error');
  }
}

let autoSaveTimer;
function autoSave() {
  clearTimeout(autoSaveTimer);
  setSaveStatus('saving', 'שומר אוטומטית...');
  autoSaveTimer = setTimeout(() => saveSession(false), 1500);
}

function setSaveStatus(cls, text) {
  const el = document.getElementById('saveStatus');
  el.className = 'save-status ' + cls;
  document.getElementById('saveStatusText').textContent = text;
}

// ═══════════════════════════ UI HELPERS ═══════════════════════════
function selectScale(groupId, value) {
  document.querySelectorAll(`#${groupId} .scale-btn`).forEach(btn => {
    btn.classList.toggle('selected', parseInt(btn.dataset.value) === value);
  });
  autoSave();
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goToDashboard() {
  showDashboard();
}

function doLogout() {
  state.participant = null;
  state.sessions = {};
  loadNamesList();
  showScreen('loginScreen');
}

function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(() => { t.className = 'toast'; }, 3000);
}

function debounce(fn, ms) {
  let t;
  return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
}

// Init — load names on page load
loadNamesList();
</script>
</body>
</html>
